name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # Runs automatically every day at midnight UTC
  workflow_dispatch:        # Allows you to trigger it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

- Scroll down and click **"Commit changes"** → **"Commit changes"**

**3. Run the workflow for the first time**

The schedule won't kick in until the next midnight UTC, so you need to run it manually the first time:

- Go to the **"Actions"** tab in your `yashvardhankamboj` repo
- On the left sidebar, click **"Generate Snake"**
- You'll see a blue banner that says *"This workflow has a workflow_dispatch event trigger"*
- Click **"Run workflow"** → select the `main` branch → click the green **"Run workflow"** button
- Wait 20–40 seconds, then refresh the page
- You should see a green checkmark — that means it worked

**4. Verify the output branch was created**

- Go back to your repo's main page
- Click the branch dropdown (it probably says `main`)
- You should now see a branch called **`output`**
- Click on it — you should see two files: `github-snake.svg` and `github-snake-dark.svg`

**5. Confirm it's working in your README**

Your README already has these lines pointing to the right place:
```
https://raw.githubusercontent.com/yashvardhankamboj/yashvardhankamboj/output/github-snake-dark.svg
https://raw.githubusercontent.com/yashvardhankamboj/yashvardhankamboj/output/github-snake.svg
